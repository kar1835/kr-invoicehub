<!DOCTYPE html>
<html>
<head>
    <title>KR InvoiceHub</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }
        .box {
            background: #1e293b;
            padding: 20px;
            border-radius: 10px;
            width: 60%;
            margin: auto;
        }
        input, button {
            padding: 10px;
            margin: 10px;
        }
        table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }
        td, th {
            border: 1px solid #334155;
            padding: 8px;
        }
        th {
            background: #2563eb;
        }
        button {
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1>🚀 KR InvoiceHub Dashboard</h1>

<div class="box">

    <input type="file" id="fileInput">
    <br>
    <button onclick="uploadFile()">Upload Invoice</button>
    <button onclick="downloadExcel()">Download Excel</button>

    <div id="status"></div>

    <table id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>Field</th>
                <th>Value</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

</div>

<script>
async function uploadFile() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    document.getElementById("status").innerText = "Uploading...";

    let formData = new FormData();
    formData.append("file", file);

    const response = await fetch("https://kr-invoicehub.onrender.com/upload/", {
        method: "POST",
        body: formData
    });

    const data = await response.json();

    document.getElementById("status").innerText = "Processed ✅";

    displayData(data.data);
}

function displayData(data) {
    const table = document.getElementById("resultTable");
    const body = document.getElementById("tableBody");

    body.innerHTML = "";

    for (let key in data) {
        let row = `<tr><td>${key}</td><td>${data[key]}</td></tr>`;
        body.innerHTML += row;
    }

    table.style.display = "table";
}

function downloadExcel() {
    window.open("https://kr-invoicehub.onrender.com/download/");
}
</script>

</body>
</html>
